<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SuperKickoff УПЛ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a7c3e; --green-light: #2db356; --green-dark: #0f4f26;
  --gold: #f5c518; --gold-dark: #c9a100;
  --dark: #0a0f0d; --dark2: #111a14; --dark3: #182019;
  --card: #1c2a1f; --card2: #243028;
  --border: rgba(45,179,86,0.18);
  --text: #e8f5eb; --text2: #8fad96;
  --red: #e03c3c; --blue: #3c8fe0; --white: #ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;background:var(--dark);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;}
body{max-width:430px;margin:0 auto;position:relative;}

/* ===== SCREENS & NAV ===== */
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.select-header{background:linear-gradient(135deg,var(--green-dark),var(--dark));padding:32px 20px 20px;text-align:center;border-bottom:2px solid var(--green);}
.select-header h1{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:3px;}
.select-header p{color:var(--text2);font-size:13px;margin-top:4px;}
.clubs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px;}
.club-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;}
.club-card.selected{border-color:var(--gold);box-shadow:0 0 16px rgba(245,197,24,0.3);}
.club-logo{font-size:36px;margin-bottom:6px;display:block;}
.club-name{font-size:12px;font-weight:700;}
.btn-start{margin:0 16px 20px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--dark);font-family:'Bebas Neue',sans-serif;font-size:22px;border:none;border-radius:14px;padding:16px;width:calc(100% - 32px);cursor:pointer;}
.btn-start:disabled{opacity:0.4;}

.top-bar{background:var(--dark2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.team-badge{display:flex;align-items:center;gap:8px;}
.stats-chips{display:flex;gap:8px;}
.chip{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--gold);}

.bottom-nav{background:var(--dark2);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:200;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;cursor:pointer;border:none;background:transparent;color:var(--text2);gap:3px;}
.nav-btn.active{color:var(--gold);}
.nav-btn span{font-size:9px;font-weight:700;}

/* ===== TABS & TACTICS ===== */
.content-area{padding-bottom:80px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
.tactic-bar, .captain-bar, .pressing-bar{background:var(--card);margin:12px;border-radius:12px;padding:12px;border:1px solid var(--border);}
.tactic-bar h3, .pressing-bar h3{font-size:12px;color:var(--text2);text-transform:uppercase;margin-bottom:8px;}
.tactic-chips{display:flex;gap:6px;flex-wrap:wrap;}
.tactic-chip{background:var(--dark3);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text2);cursor:pointer;}
.tactic-chip.active{background:var(--green);color:var(--white);}
.captain-select{background:var(--dark3);border:1px solid var(--border);border-radius:8px;color:var(--gold);padding:6px;width:100%;}

/* ===== PITCH ===== */
.pitch-wrap{margin:0 12px;border-radius:14px;overflow:hidden;border:2px solid var(--green-dark);position:relative;}
.pitch{background:var(--green);width:100%;aspect-ratio:7/11;position:relative;}
.player-dot{position:absolute;width:36px;height:36px;transform:translate(-50%,-50%);cursor:grab;z-index:10;display:flex;flex-direction:column;align-items:center;}
.player-circle{width:30px;height:30px;border-radius:50%;background:var(--blue);border:2.5px solid var(--white);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--white);}
.player-dot.dragging .player-circle{border-color:var(--gold);}
.player-label{font-size:7.5px;color:var(--white);margin-top:2px;text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap;}
.stamina-bar{width:100%;height:3px;background:red;margin-top:2px;}
.stamina-fill{height:100%;background:lime;width:100%;}

/* ===== SQUAD & MARKET ===== */
.section-title{font-family:'Bebas Neue';font-size:18px;color:var(--gold);padding:14px 16px 6px;}
.player-row{background:var(--card);margin:0 12px 6px;border-radius:11px;padding:11px;display:flex;align-items:center;gap:10px;border:1px solid var(--border);}
.player-num{width:26px;height:26px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--white);}
.player-info-name{font-size:13px;font-weight:700;}
.player-info-pos{font-size:10px;color:var(--text2);}
.player-rating{font-family:'Bebas Neue';font-size:22px;color:var(--gold);margin-left:auto;}
.btn-select-p{background:var(--green);border:none;border-radius:8px;color:var(--white);font-size:10px;padding:5px 8px;cursor:pointer;}
.market-search{margin:10px 12px;background:var(--card);padding:10px;border-radius:10px;display:flex;}
.market-search input{background:transparent;border:none;color:var(--white);width:100%;}

/* ===== MATCH & TABLE ===== */
.schedule-card{background:var(--card);margin:12px;padding:16px;border-radius:12px;text-align:center;}
.btn-simulate{background:var(--green);color:var(--white);font-family:'Bebas Neue';font-size:20px;padding:12px;width:100%;border:none;border-radius:10px;margin-top:10px;}
.match-screen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:var(--dark);z-index:500;flex-direction:column;}
.match-screen.open{display:flex;}
.match-score{font-family:'Bebas Neue';font-size:44px;color:var(--gold);text-align:center;padding:20px;}
.match-events{flex:1;overflow-y:auto;padding:16px;}
.event-row{font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);}
.match-btns{display:flex;padding:12px;gap:10px;}
.btn-pause{flex:1;background:var(--gold);color:var(--dark);padding:10px;font-weight:bold;border:none;border-radius:8px;}
.btn-end-match{flex:1;background:var(--red);color:var(--white);padding:10px;font-weight:bold;border:none;border-radius:8px;}

.league-table{margin:12px;background:var(--card);border-radius:12px;font-size:11px;}
.table-header, .table-row{display:grid;grid-template-columns:20px 1fr 20px 20px 20px 20px 20px 25px;padding:8px;border-bottom:1px solid var(--border);}
.table-header{font-weight:bold;color:var(--text2);}
.my-team{background:rgba(45,179,86,0.1);}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-content{background:var(--dark2);padding:20px;border-radius:12px;width:90%;max-height:80%;overflow-y:auto;}
.modal-close{background:var(--red);color:#fff;border:none;padding:5px 10px;border-radius:5px;float:right;}
</style>
</head>
<body>

<div class="screen active" id="screen-select">
  <div class="select-header">
    <h1>⚽ SUPERKICKOFF</h1>
    <p>Українська Прем'єр-Ліга</p>
  </div>
  <div class="clubs-grid" id="clubs-grid"></div>
  <button class="btn-start" id="btn-start" disabled onclick="startGame()">РОЗПОЧАТИ ГРУ</button>
</div>

<div class="screen" id="screen-app">
  <div class="top-bar">
    <div class="team-badge"><span id="tb-name">Команда</span></div>
    <div class="stats-chips">
      <span class="chip" id="chip-budget">€10M</span>
      <span class="chip" id="chip-points">0 ОЧК</span>
    </div>
  </div>

  <div class="content-area" id="main-content">
    
    <div class="tab-content active" id="tab-field">
      <div class="tactic-bar">
        <h3>Тактика</h3>
        <div class="tactic-chips">
          <div class="tactic-chip active" onclick="setFormation('4-4-2')">4-4-2</div>
          <div class="tactic-chip" onclick="setFormation('4-3-3')">4-3-3</div>
          <div class="tactic-chip" onclick="setFormation('3-5-2')">3-5-2</div>
        </div>
      </div>
      <div class="pressing-bar">
        <h3>Стиль пресингу</h3>
        <div class="tactic-chips">
          <div class="tactic-chip" id="press-soft" onclick="setPressing('soft')">М'який</div>
          <div class="tactic-chip active" id="press-med" onclick="setPressing('med')">Інтенсивний</div>
          <div class="tactic-chip" id="press-hard" onclick="setPressing('hard')">Жорсткий</div>
        </div>
      </div>
      <div class="captain-bar">
        <select class="captain-select" id="captain-select"></select>
      </div>
      <div class="pitch-wrap">
        <div class="pitch" id="pitch"></div>
      </div>
    </div>

    <div class="tab-content" id="tab-squad">
      <div class="section-title">ОСНОВНИЙ СКЛАД</div>
      <div id="squad-list"></div>
    </div>

    <div class="tab-content" id="tab-market">
      <div class="market-search">
        <input type="text" id="market-search" placeholder="Пошук гравців..." onkeyup="renderMarket()">
      </div>
      <div id="market-list"></div>
    </div>

    <div class="tab-content" id="tab-match">
      <div class="schedule-card">
        <h3 id="next-match-title">Наступний матч</h3>
        <p id="next-match-teams" style="margin:10px 0; font-size:18px; color:var(--gold);"></p>
        <button class="btn-simulate" onclick="openMatch()">ГРАТИ МАТЧ</button>
      </div>
    </div>

    <div class="tab-content" id="tab-table">
      <div class="league-table" id="league-table"></div>
    </div>

  </div>

  <div class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('field', this)"><span>ПОЛЕ</span></button>
    <button class="nav-btn" onclick="switchTab('squad', this)"><span>СКЛАД</span></button>
    <button class="nav-btn" onclick="switchTab('market', this)"><span>РИНОК</span></button>
    <button class="nav-btn" onclick="switchTab('match', this)"><span>МАТЧІ</span></button>
    <button class="nav-btn" onclick="switchTab('table', this)"><span>ТАБЛИЦЯ</span></button>
  </div>
</div>

<div class="match-screen" id="match-screen">
  <div class="match-score" id="match-score-text">0 : 0</div>
  <div style="text-align:center; color:var(--text2);" id="match-time">0'</div>
  <div class="match-events" id="match-events"></div>
  <div class="match-btns">
    <button class="btn-pause" id="btn-pause" onclick="togglePause()">ПАУЗА / ЗАМІНИ</button>
    <button class="btn-end-match" id="btn-end" style="display:none;" onclick="finishMatch()">ЗАВЕРШИТИ</button>
  </div>
</div>

<div class="modal-overlay" id="pause-modal">
  <div class="modal-content">
    <button class="modal-close" onclick="togglePause()">X</button>
    <h2 style="color:var(--gold); margin-bottom:10px;">ЗАМІНИ ТА ТАКТИКА</h2>
    <p style="font-size:12px; color:var(--text2); margin-bottom:10px;">Оберіть гравця основи і запасу для заміни.</p>
    <div id="subs-list"></div>
  </div>
</div>

<script>
// --- ДАНІ КЛУБІВ ---
const clubs = [
  { id: 1, name: "Динамо Київ", logo: "🔵" },
  { id: 2, name: "Шахтар", logo: "⚒️" },
  { id: 3, name: "Кривбас", logo: "🔴" },
  { id: 4, name: "Дніпро-1", logo: "🟡" },
  { id: 5, name: "Полісся", logo: "🐺" },
  { id: 6, name: "Рух", logo: "💛" },
  { id: 7, name: "Ворскла", logo: "🟢" },
  { id: 8, name: "Олександрія", logo: "🟡" }
];

// --- ГЕНЕРАТОР ГРАВЦІВ (500+) ---
const firstNames = ["Андрій", "Михайло", "Олександр", "Віктор", "Георгій", "Микола", "Тарас", "Артем", "Володимир", "Ілля"];
const lastNames = ["Шовковський", "Мудрик", "Зінченко", "Циганков", "Судаков", "Степаненко", "Довбик", "Забарний", "Бущан", "Трубін", "Бражко", "Шапаренко", "Різник", "Зубков"];
const positions = ["GK", "DEF", "DEF", "DEF", "MID", "MID", "MID", "MID", "FWD", "FWD"];

let playersDB = [];
let playerIdCounter = 1;

function generatePlayers() {
  // Генеруємо для кожного клубу по 25 гравців
  clubs.forEach(club => {
    for(let i=0; i<25; i++) {
      playersDB.push({
        id: playerIdCounter++,
        name: firstNames[Math.floor(Math.random()*firstNames.length)] + " " + lastNames[Math.floor(Math.random()*lastNames.length)],
        pos: positions[i % positions.length],
        rating: Math.floor(Math.random() * 25) + 65,
        clubId: club.id,
        stamina: 100,
        price: Math.floor(Math.random() * 5000000) + 500000
      });
    }
  });
  // Генеруємо ще 300 вільних агентів/легіонерів
  for(let i=0; i<300; i++) {
    playersDB.push({
      id: playerIdCounter++,
      name: "Легіонер " + i,
      pos: positions[Math.floor(Math.random()*positions.length)],
      rating: Math.floor(Math.random() * 30) + 60,
      clubId: null,
      stamina: 100,
      price: Math.floor(Math.random() * 3000000) + 100000
    });
  }
}

// --- СТАН ГРИ ---
let myClubId = null;
let mySquad = [];
let startingXI = [];
let budget = 10000000;
let currentFormation = '4-4-2';
let pressingStyle = 'med'; // soft, med, hard
let leagueTable = clubs.map(c => ({id: c.id, name: c.name, p:0, w:0, d:0, l:0, gf:0, ga:0, pts:0}));
let currentRound = 0;
let schedule = [];

// --- ІНІЦІАЛІЗАЦІЯ ---
function initSelectScreen() {
  generatePlayers();
  const grid = document.getElementById('clubs-grid');
  clubs.forEach(club => {
    const div = document.createElement('div');
    div.className = 'club-card';
    div.innerHTML = `<span class="club-logo">${club.logo}</span><div class="club-name">${club.name}</div>`;
    div.onclick = () => {
      document.querySelectorAll('.club-card').forEach(c => c.classList.remove('selected'));
      div.classList.add('selected');
      myClubId = club.id;
      document.getElementById('btn-start').disabled = false;
    };
    grid.appendChild(div);
  });
  generateSchedule();
}

function startGame() {
  document.getElementById('screen-select').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  
  const myClub = clubs.find(c => c.id === myClubId);
  document.getElementById('tb-name').innerText = myClub.logo + " " + myClub.name;
  
  mySquad = playersDB.filter(p => p.clubId === myClubId);
  
  // Авто-підбір складу
  startingXI = [
    mySquad.find(p => p.pos === 'GK'),
    ...mySquad.filter(p => p.pos === 'DEF').slice(0,4),
    ...mySquad.filter(p => p.pos === 'MID').slice(0,4),
    ...mySquad.filter(p => p.pos === 'FWD').slice(0,2)
  ].filter(p => p !== undefined);

  updateUI();
}

// --- НАВІГАЦІЯ ---
function switchTab(tabId, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tabId).classList.add('active');
  btn.classList.add('active');
  updateUI();
}

// --- ОСНОВНИЙ UI ---
function updateUI() {
  document.getElementById('chip-budget').innerText = "€" + (budget/1000000).toFixed(1) + "M";
  renderPitch();
  renderSquad();
  renderMarket();
  renderSchedule();
  renderTable();
}

// --- ТАКТИКА І ПРЕСИНГ ---
function setPressing(style) {
  pressingStyle = style;
  document.querySelectorAll('#tab-field .tactic-chip').forEach(c => {
    if(c.id && c.id.startsWith('press-')) c.classList.remove('active');
  });
  document.getElementById('press-' + style).classList.add('active');
}

function setFormation(form) {
  currentFormation = form;
  document.querySelectorAll('.tactic-bar .tactic-chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  renderPitch();
}

// --- DRAG & DROP ПОЛЕ ---
let draggedIndex = null;

function renderPitch() {
  const pitch = document.getElementById('pitch');
  pitch.innerHTML = '';
  const posMap = {
    '4-4-2': [ {x:50,y:90}, {x:20,y:70}, {x:40,y:70}, {x:60,y:70}, {x:80,y:70}, {x:20,y:40}, {x:40,y:40}, {x:60,y:40}, {x:80,y:40}, {x:35,y:15}, {x:65,y:15} ],
    '4-3-3': [ {x:50,y:90}, {x:20,y:70}, {x:40,y:70}, {x:60,y:70}, {x:80,y:70}, {x:30,y:45}, {x:50,y:45}, {x:70,y:45}, {x:20,y:20}, {x:50,y:15}, {x:80,y:20} ],
    '3-5-2': [ {x:50,y:90}, {x:30,y:75}, {x:50,y:75}, {x:70,y:75}, {x:15,y:50}, {x:35,y:50}, {x:50,y:50}, {x:65,y:50}, {x:85,y:50}, {x:35,y:20}, {x:65,y:20} ]
  };

  const coords = posMap[currentFormation];
  
  startingXI.forEach((player, index) => {
    if(!player) return;
    const dot = document.createElement('div');
    dot.className = 'player-dot';
    dot.style.left = coords[index].x + '%';
    dot.style.top = coords[index].y + '%';
    dot.draggable = true;
    
    dot.innerHTML = `
      <div class="player-circle">${player.pos}</div>
      <div class="stamina-bar"><div class="stamina-fill" style="width:${player.stamina}%"></div></div>
      <div class="player-label">${player.name.split(' ')[1] || player.name}</div>
    `;

    dot.addEventListener('dragstart', (e) => { draggedIndex = index; });
    dot.addEventListener('dragover', (e) => e.preventDefault());
    dot.addEventListener('drop', (e) => {
      e.preventDefault();
      if(draggedIndex !== null && draggedIndex !== index) {
        // Swap players in array
        let temp = startingXI[draggedIndex];
        startingXI[draggedIndex] = startingXI[index];
        startingXI[index] = temp;
        renderPitch();
      }
    });

    pitch.appendChild(dot);
  });
}

function renderSquad() {
  const list = document.getElementById('squad-list');
  list.innerHTML = '';
  mySquad.forEach(p => {
    let inXI = startingXI.includes(p);
    list.innerHTML += `
      <div class="player-row">
        <div class="player-num">${p.pos}</div>
        <div>
          <div class="player-info-name">${p.name}</div>
          <div class="player-info-pos">Витривалість: ${Math.round(p.stamina)}%</div>
        </div>
        <div class="player-rating">${p.rating}</div>
        <button class="btn-select-p ${inXI?'in-squad':''}" onclick="swapIntoXI(${p.id})">
          ${inXI ? 'В ОСНОВІ' : 'ДО ОСНОВИ'}
        </button>
      </div>`;
  });
}

function swapIntoXI(id) {
  const p = mySquad.find(x => x.id === id);
  if(startingXI.includes(p)) return;
  // Знаходимо першого гравця такої ж позиції і міняємо
  const indexToReplace = startingXI.findIndex(x => x && x.pos === p.pos);
  if(indexToReplace !== -1) {
    startingXI[indexToReplace] = p;
  } else {
    startingXI[0] = p; // fall back
  }
  renderPitch();
  renderSquad();
}

function renderMarket() {
  const q = document.getElementById('market-search').value.toLowerCase();
  const list = document.getElementById('market-list');
  list.innerHTML = '';
  
  let count = 0;
  for(let p of playersDB) {
    if(p.clubId === myClubId) continue; // свої не продаються
    if(q && !p.name.toLowerCase().includes(q)) continue;
    if(count > 20) break; // ліміт для швидкодії
    
    list.innerHTML += `
      <div class="player-row">
        <div class="player-num" style="background:#444">${p.pos}</div>
        <div>
          <div class="player-info-name">${p.name}</div>
          <div class="player-info-pos">Рейтинг: ${p.rating}</div>
        </div>
        <div class="player-rating" style="font-size:16px;">€${(p.price/1000000).toFixed(1)}M</div>
        <button class="btn-select-p" onclick="buyPlayer(${p.id})">КУПИТИ</button>
      </div>`;
    count++;
  }
}

function buyPlayer(id) {
  const p = playersDB.find(x => x.id === id);
  if(budget >= p.price) {
    budget -= p.price;
    p.clubId = myClubId;
    mySquad.push(p);
    updateUI();
    alert(`Ви придбали гравця: ${p.name}`);
  } else {
    alert("Недостатньо коштів!");
  }
}
