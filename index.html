<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superkickoff Mobile Clone</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --primary: #00E676;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --nav-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* Екран вибору команди */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-dark);
            z-index: 1000; display: flex; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .team-card {
            background-color: var(--bg-panel); padding: 15px; border-radius: 10px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary);
        }
        .team-card h3 { margin-bottom: 5px; }
        .team-card p { font-size: 12px; color: var(--text-muted); }
        .btn-select { background: var(--primary); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }

        /* Основний інтерфейс */
        #app-interface { display: none; flex-direction: column; height: 100%; }
        header { background-color: var(--bg-panel); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .finances { font-weight: bold; color: var(--primary); }

        main { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-height) + 20px); position: relative; }
        .screen { display: none; padding: 15px; animation: fadeIn 0.2s ease; }
        .screen.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Тактика і Склад */
        .tactics-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .tactics-bar select { flex: 1; background: var(--bg-panel); color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; }

        .pitch {
            background: linear-gradient(180deg, #1a5c2b 0%, #227c3a 100%); border-radius: 12px; height: 320px;
            position: relative; border: 2px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; justify-content: space-around;
            margin-bottom: 15px;
        }
        .line { display: flex; justify-content: space-evenly; width: 100%; z-index: 2; }
        .player { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .player.selected .player-dot { border-color: #FFEB3B; box-shadow: 0 0 10px #FFEB3B; }
        .player.captain .player-dot::after { content: 'C'; position: absolute; top: -5px; right: -5px; background: yellow; color: black; font-size: 8px; width: 12px; height: 12px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .player-dot { width: 30px; height: 30px; background-color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: black; font-weight: bold; font-size: 11px; border: 2px solid var(--primary); position: relative; }
        .player-name { margin-top: 4px; font-size: 10px; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; white-space: nowrap; }

        .bench-list { background: var(--bg-panel); border-radius: 10px; padding: 10px; }
        .bench-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 14px; }
        .bench-item.selected { background: rgba(255, 235, 59, 0.2); }

        /* Трансфери */
        .market-item { background: var(--bg-panel); padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .btn-buy { background: var(--primary); color: #000; border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; }

        /* Матч та Ліга */
        table { width: 100%; border-collapse: collapse; background: var(--bg-panel); border-radius: 10px; overflow: hidden; font-size: 14px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #2a2a2a; color: var(--text-muted); font-size: 12px; }
        .my-team-row { color: var(--primary); font-weight: bold; }

        .match-card { background: var(--bg-panel); padding: 20px; border-radius: 10px; text-align: center; }
        .score { font-size: 36px; font-weight: bold; margin: 15px 0; }
        .btn-play { background: var(--primary); color: #000; border: none; padding: 12px 30px; border-radius: 20px; font-size: 16px; font-weight: bold; width: 100%; margin-top: 20px; }

        /* Навігація */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: var(--bg-panel); display: flex; border-top: 1px solid #333; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-muted); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="margin-bottom: 20px; text-align: center; color: var(--primary);">Вибір клубу</h2>
        <div id="teams-list"></div>
    </div>

    <div id="app-interface">
        <header>
            <div>
                <h1 id="header-team" style="font-size: 16px;">Команда</h1>
                <p id="header-coach" style="font-size: 11px; color: var(--text-muted);">Тренер</p>
            </div>
            <div class="finances" id="header-budget">$0</div>
        </header>

        <main>
            <div id="squad-screen" class="screen active">
                <div class="tactics-bar">
                    <select id="formation-select" onchange="changeFormation()">
                        <option value="4-3-3">4-3-3</option>
                        <option value="4-4-2">4-4-2</option>
                        <option value="3-5-2">3-5-2</option>
                    </select>
                    <select id="captain-select" onchange="setCaptain()"></select>
                </div>
                <div class="pitch" id="pitch"></div>
                <div style="font-size: 12px; margin: 10px 0; color: var(--text-muted); text-align:center;">Торкнись гравця на полі, а потім на лаві, щоб зробити заміну</div>
                <div class="bench-list" id="bench"></div>
            </div>

            <div id="transfers-screen" class="screen">
                <h2 style="margin-bottom: 15px;">Трансферний ринок</h2>
                <div id="market-list"></div>
            </div>

            <div id="league-screen" class="screen">
                <h2 style="margin-bottom: 15px;">УПЛ Турнірна таблиця</h2>
                <table id="league-table">
                    <thead><tr><th>Клуб</th><th>І</th><th>О</th></tr></thead>
                    <tbody id="league-body"></tbody>
                </table>
            </div>

            <div id="match-screen" class="screen">
                <div class="match-card">
                    <h3 id="match-title">Наступний матч</h3>
                    <div class="score" id="match-score">0 - 0</div>
                    <div id="match-logs" style="color: var(--text-muted); font-size: 14px; height: 20px;"></div>
                    <button class="btn-play" id="btn-sim" onclick="simulateMatch()">СИМУЛЮВАТИ</button>
                </div>
            </div>
        </main>

        <nav>
            <div class="nav-item active" onclick="nav('squad')"><div class="nav-icon">👕</div>Склад</div>
            <div class="nav-item" onclick="nav('transfers')"><div class="nav-icon">💰</div>Ринок</div>
            <div class="nav-item" onclick="nav('league')"><div class="nav-icon">🏆</div>Ліга</div>
            <div class="nav-item" onclick="nav('match')"><div class="nav-icon">⚽</div>Матч</div>
        </nav>
    </div>

    <script>
        // БАЗА ДАНИХ (Адаптовано під актуальні умови)
        const leagueTeams = [
            { id: 'shd', name: 'Шахтар', coach: 'Маріно Пушич', points: 0, games: 0 },
            { id: 'dyn', name: 'Динамо', coach: 'О. Шовковський', points: 0, games: 0 },
            { id: 'kry', name: 'Кривбас', coach: 'Юрій Вернидуб', points: 0, games: 0 },
            { id: 'pol', name: 'Полісся', coach: 'Імад Ашур', points: 0, games: 0 },
            { id: 'ruk', name: 'Рух', coach: 'Віталій Пономарьов', points: 0, games: 0 },
            { id: 'lnz', name: 'ЛНЗ', coach: 'Андрес Карраско', points: 0, games: 0 },
            { id: 'ole', name: 'Олександрія', coach: 'Руслан Ротань', points: 0, games: 0 },
            { id: 'kol', name: 'Колос', coach: 'Олександр Поздєєв', points: 0, games: 0 }
        ];

        // Дефолтні гравці для команди гравця
        let mySquad = [
            { id: 1, name: 'Різник', pos: 'GK', r: 80 }, { id: 2, name: 'Конопля', pos: 'DEF', r: 78 },
            { id: 3, name: 'Матвієнко', pos: 'DEF', r: 81 }, { id: 4, name: 'Бондар', pos: 'DEF', r: 77 },
            { id: 5, name: 'Азаров', pos: 'DEF', r: 76 }, { id: 6, name: 'Степаненко', pos: 'MID', r: 79 },
            { id: 7, name: 'Судаков', pos: 'MID', r: 84 }, { id: 8, name: 'Бондаренко', pos: 'MID', r: 80 },
            { id: 9, name: 'Зубков', pos: 'FWD', r: 79 }, { id: 10, name: 'Сікан', pos: 'FWD', r: 78 },
            { id: 11, name: 'Кевін', pos: 'FWD', r: 76 },
            // Лава
            { id: 12, name: 'Фесюн', pos: 'GK', r: 70 }, { id: 13, name: 'Егіналду', pos: 'FWD', r: 75 },
            { id: 14, name: 'Криськів', pos: 'MID', r: 77 }, { id: 15, name: 'Гочолейшвілі', pos: 'DEF', r: 74 }
        ];

        let transferMarket = [
            { id: 101, name: 'Шапаренко', pos: 'MID', r: 83, price: 15000000 },
            { id: 102, name: 'Ярмоленко', pos: 'FWD', r: 79, price: 3000000 },
            { id: 103, name: 'Піхальонок', pos: 'MID', r: 81, price: 5000000 },
            { id: 104, name: 'Гуцуляк', pos: 'FWD', r: 78, price: 2000000 },
            { id: 105, name: 'Сваток', pos: 'DEF', r: 77, price: 1500000 }
        ];

        // Стан гри
        const GameState = {
            team: null,
            budget: 20000000,
            starters: [],
            bench: [],
            formation: [4, 3, 3], // Захист, Півзахист, Напад
            captainId: null,
            selectedPlayerId: null,
            currentMatchIndex: 0
        };

        // ІНІЦІАЛІЗАЦІЯ
        window.onload = () => {
            const list = document.getElementById('teams-list');
            leagueTeams.forEach(t => {
                list.innerHTML += `
                    <div class="team-card">
                        <div><h3>${t.name}</h3><p>Тренер: ${t.coach}</p></div>
                        <button class="btn-select" onclick="startGame('${t.id}')">Обрати</button>
                    </div>`;
            });
        };

        function startGame(teamId) {
            GameState.team = leagueTeams.find(t => t.id === teamId);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('app-interface').style.display = 'flex';
            
            document.getElementById('header-team').innerText = GameState.team.name;
            document.getElementById('header-coach').innerText = `Тренер: ${GameState.team.coach}`;
            updateBudgetUI();

            // Розподіл складу
            GameState.starters = mySquad.slice(0, 11);
            GameState.bench = mySquad.slice(11);
            GameState.captainId = GameState.starters[0].id;

            updateSquadUI();
            updateCaptainSelect();
            renderMarket();
            renderLeague();
            prepareMatch();
        }

        // НАВІГАЦІЯ
        function nav(tabId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId + '-screen').classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function updateBudgetUI() {
            document.getElementById('header-budget').innerText = `$ ${(GameState.budget / 1000000).toFixed(1)}M`;
        }

        // СИСТЕМА СКЛАДУ ТА ТАКТИКИ
        function changeFormation() {
            const val = document.getElementById('formation-select').value;
            GameState.formation = val.split('-').map(Number);
            updateSquadUI();
        }

        function updateCaptainSelect() {
            const sel = document.getElementById('captain-select');
            sel.innerHTML = '';
            GameState.starters.forEach(p => {
                sel.innerHTML += `<option value="${p.id}" ${p.id == GameState.captainId ? 'selected' : ''}>${p.name} (Кап)</option>`;
            });
        }

        function setCaptain() {
            GameState.captainId = parseInt(document.getElementById('captain-select').value);
            updateSquadUI();
        }

        function updateSquadUI() {
            const pitch = document.getElementById('pitch');
            pitch.innerHTML = '';
            
            // Нападники
            pitch.appendChild(createLine(GameState.starters.slice(1 + GameState.formation[0] + GameState.formation[1])));
            // Півзахист
            pitch.appendChild(createLine(GameState.starters.slice(1 + GameState.formation[0], 1 + GameState.formation[0] + GameState.formation[1])));
            // Захист
            pitch.appendChild(createLine(GameState.starters.slice(1, 1 + GameState.formation[0])));
            // Воротар
            pitch.appendChild(createLine([GameState.starters[0]]));

            // Лава
            const bench = document.getElementById('bench');
            bench.innerHTML = '<h4>Лава запасних</h4>';
            GameState.bench.forEach(p => {
                const isSel = p.id === GameState.selectedPlayerId ? 'selected' : '';
                bench.innerHTML += `
                    <div class="bench-item ${isSel}" onclick="selectPlayer(${p.id})">
                        <span>${p.pos} | ${p.name}</span>
                        <strong>${p.r}</strong>
                    </div>`;
            });
        }

        function createLine(players) {
            const line = document.createElement('div');
            line.className = 'line';
            players.forEach(p => {
                const isSel = p.id === GameState.selectedPlayerId ? 'selected' : '';
                const isCap = p.id === GameState.captainId ? 'captain' : '';
                line.innerHTML += `
                    <div class="player ${isSel} ${isCap}" onclick="selectPlayer(${p.id})">
                        <div class="player-dot">${p.r}</div>
                        <div class="player-name">${p.name}</div>
                    </div>`;
            });
            return line;
        }

        function selectPlayer(id) {
            if (!GameState.selectedPlayerId) {
                GameState.selectedPlayerId = id;
            } else {
                if (GameState.selectedPlayerId !== id) {
                    swapPlayers(GameState.selectedPlayerId, id);
                }
                GameState.selectedPlayerId = null;
            }
            updateSquadUI();
            updateCaptainSelect();
        }

        function swapPlayers(id1, id2) {
            const idx1_start = GameState.starters.findIndex(p => p.id === id1);
            const idx1_bench = GameState.bench.findIndex(p => p.id === id1);
            const idx2_start = GameState.starters.findIndex(p => p.id === id2);
            const idx2_bench = GameState.bench.findIndex(p => p.id === id2);

            let p1, p2;
            if(idx1_start > -1) p1 = GameState.starters[idx1_start]; else p1 = GameState.bench[idx1_bench];
            if(idx2_start > -1) p2 = GameState.starters[idx2_start]; else p2 = GameState.bench[idx2_bench];

            if(idx1_start > -1) GameState.starters[idx1_start] = p2; else GameState.bench[idx1_bench] = p2;
            if(idx2_start > -1) GameState.starters[idx2_start] = p1; else GameState.bench[idx2_bench] = p1;
        }

        // РИНОК
        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = '';
            transferMarket.forEach(p => {
                list.innerHTML += `
                    <div class="market-item">
                        <div>
                            <strong>${p.name}</strong> (${p.pos}, Рейтинг: ${p.r})<br>
                            <span style="color:var(--primary); font-size:12px;">$ ${(p.price / 1000000).toFixed(1)}M</span>
                        </div>
                        <button class="btn-buy" onclick="buyPlayer(${p.id})">Купити</button>
                    </div>`;
            });
        }

        function buyPlayer(id) {
            const idx = transferMarket.findIndex(p => p.id === id);
            const player = transferMarket[idx];
            if (GameState.budget >= player.price) {
                GameState.budget -= player.price;
                GameState.bench.push(player);
                transferMarket.splice(idx, 1);
                updateBudgetUI();
                renderMarket();
                updateSquadUI();
                alert(`Ви успішно підписали ${player.name}! Він доданий на лаву запасних.`);
            } else {
                alert("Недостатньо коштів!");
            }
        }

        // ЛІГА ТА МАТЧ
        function renderLeague() {
            leagueTeams.sort((a, b) => b.points - a.points);
            const tbody = document.getElementById('league-body');
            tbody.innerHTML = '';
            leagueTeams.forEach(t => {
                const isMy = t.id === GameState.team.id ? 'my-team-row' : '';
                tbody.innerHTML += `<tr class="${isMy}"><td>${t.name}</td><td>${t.games}</td><td><b>${t.points}</b></td></tr>`;
            });
        }

        function getOpponent() {
            const opponents = leagueTeams.filter(t => t.id !== GameState.team.id);
            return opponents[GameState.currentMatchIndex % opponents.length];
        }

        function prepareMatch() {
            const opp = getOpponent();
            document.getElementById('match-title').innerText = `${GameState.team.name} vs ${opp.name}`;
            document.getElementById('match-score').innerText = '0 - 0';
            document.getElementById('match-logs').innerText = 'Очікування початку...';
            document.getElementById('btn-sim').disabled = false;
            document.getElementById('btn-sim').innerText = 'СИМУЛЮВАТИ';
        }

        function simulateMatch() {
            const btn = document.getElementById('btn-sim');
            btn.disabled = true;
            
            let homeG = 0, awayG = 0, time = 0;
            const log = document.getElementById('match-logs');
            const score = document.getElementById('match-score');
            
            // Розрахунок сили команди (просто середній рейтинг основи)
            const teamPower = GameState.starters.reduce((acc, p) => acc + p.r, 0) / 11;

            const interval = setInterval(() => {
                time += 15;
                log.innerText = `${time}-а хвилина матчу...`;
                
                // Проста логіка шансів на основі сили
                if (Math.random() * 100 < (teamPower
