<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Football Manager Mobile</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-panel: #1e1e1e;
            --primary: #00E676; /* Зелений футбольний акцент */
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --nav-height: 60px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Стилізація шапки */
        header {
            background-color: var(--bg-panel);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            z-index: 10;
        }

        .club-info h1 {
            font-size: 18px;
            font-weight: 700;
        }

        .club-info p {
            font-size: 12px;
            color: var(--primary);
        }

        .finances {
            font-size: 16px;
            font-weight: 600;
            background: rgba(0, 230, 118, 0.1);
            padding: 5px 10px;
            border-radius: 8px;
            color: var(--primary);
        }

        /* Основний контент */
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding-bottom: var(--nav-height); /* Місце для нижнього меню */
        }

        .screen {
            display: none;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Екран Складу (Поле) */
        .pitch {
            background: linear-gradient(180deg, #1a5c2b 0%, #227c3a 100%);
            border-radius: 12px;
            height: 60vh;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .pitch::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%);
        }

        .pitch::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .line {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            width: 100%;
            z-index: 2;
        }

        .player {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .player-dot {
            width: 30px;
            height: 30px;
            background-color: var(--text-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
            font-size: 12px;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .player-name {
            margin-top: 4px;
            font-size: 11px;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Екран Таблиці */
        .league-table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--bg-panel);
            border-radius: 12px;
            overflow: hidden;
        }

        .league-table th, .league-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 14px;
        }

        .league-table th {
            background-color: #2a2a2a;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .league-table tr:last-child td {
            border-bottom: none;
        }

        .team-row.my-team td {
            color: var(--primary);
            font-weight: bold;
            background-color: rgba(0, 230, 118, 0.05);
        }

        .text-center { text-align: center; }

        /* Екран Матчу */
        .match-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            background-color: var(--bg-panel);
            border-radius: 12px;
        }

        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            width: 100%;
        }

        .team-shield {
            width: 60px;
            height: 60px;
            background-color: #333;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
        }

        .btn-play {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-play:active {
            transform: scale(0.95);
        }

        .match-logs {
            margin-top: 20px;
            width: 80%;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            min-height: 40px;
        }

        /* Нижня навігація */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--bg-panel);
            display: flex;
            border-top: 1px solid #333;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-icon {
            font-size: 20px;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

    <header>
        <div class="club-info">
            <h1>Шахтар</h1>
            <p>Рейтинг: 85</p>
        </div>
        <div class="finances">$ 45.5M</div>
    </header>

    <main>
        <div id="squad-screen" class="screen active">
            <h2 style="margin-bottom: 15px; font-size: 18px;">Формація 4-3-3</h2>
            <div class="pitch">
                <div class="line fw">
                    <div class="player"><div class="player-dot">9</div><div class="player-name">Сікан</div></div>
                    <div class="player"><div class="player-dot">11</div><div class="player-name">Зубков</div></div>
                    <div class="player"><div class="player-dot">7</div><div class="player-name">Егіналду</div></div>
                </div>
                <div class="line mid">
                    <div class="player"><div class="player-dot">10</div><div class="player-name">Судаков</div></div>
                    <div class="player"><div class="player-dot">8</div><div class="player-name">Шапаренко</div></div>
                    <div class="player"><div class="player-dot">21</div><div class="player-name">Бондаренко</div></div>
                </div>
                <div class="line def">
                    <div class="player"><div class="player-dot">3</div><div class="player-name">Азаров</div></div>
                    <div class="player"><div class="player-dot">22</div><div class="player-name">Матвієнко</div></div>
                    <div class="player"><div class="player-dot">5</div><div class="player-name">Бондар</div></div>
                    <div class="player"><div class="player-dot">2</div><div class="player-name">Конопля</div></div>
                </div>
                <div class="line gk">
                    <div class="player"><div class="player-dot">1</div><div class="player-name">Різник</div></div>
                </div>
            </div>
        </div>

        <div id="league-screen" class="screen">
            <h2 style="margin-bottom: 15px; font-size: 18px;">Турнірна таблиця</h2>
            <table class="league-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Клуб</th>
                        <th class="text-center">І</th>
                        <th class="text-center">О</th>
                    </tr>
                </thead>
                <tbody id="league-body">
                    </tbody>
            </table>
        </div>

        <div id="match-screen" class="screen">
            <h2 style="margin-bottom: 15px; font-size: 18px; text-align: center;">Наступний тур</h2>
            <div class="match-container">
                <div class="scoreboard">
                    <div class="team-shield" style="background-color: #f37021;">ШХ</div>
                    <div class="score-number" id="home-score">0</div>
                    <div style="font-weight: bold; color: #555;">-</div>
                    <div class="score-number" id="away-score">0</div>
                    <div class="team-shield" style="background-color: #005A9C;" id="away-shield">ДН</div>
                </div>
                <div style="margin-bottom: 10px; font-weight: 600;" id="opponent-name">Шахтар vs Динамо</div>
                <button class="btn-play" id="play-btn" onclick="playMatch()">Симулювати</button>
                <div class="match-logs" id="match-logs">Готові до початку матчу...</div>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-item active" onclick="switchTab('squad', this)">
            <div class="nav-icon">👕</div>
            <span>Склад</span>
        </div>
        <div class="nav-item" onclick="switchTab('league', this)">
            <div class="nav-icon">🏆</div>
            <span>Ліга</span>
        </div>
        <div class="nav-item" onclick="switchTab('match', this)">
            <div class="nav-icon">⚽</div>
            <span>Матч</span>
        </div>
    </nav>

    <script>
        // Дані ліги (відсортовані за очками)
        // Виключено команди, які не в цій лізі
        let teams = [
            { id: 'shakhtar', name: 'Шахтар', points: 15, games: 5, color: '#f37021', short: 'ШХ' },
            { id: 'dynamo', name: 'Динамо', points: 13, games: 5, color: '#005A9C', short: 'ДН' },
            { id: 'epicentr', name: 'Епіцентр', points: 10, games: 5, color: '#1B5E20', short: 'ЕП' },
            { id: 'polissya', name: 'Полісся', points: 9, games: 5, color: '#FFD700', short: 'ПЛ' },
            { id: 'kryvbas', name: 'Кривбас', points: 7, games: 5, color: '#D32F2F', short: 'КР' },
            { id: 'rukh', name: 'Рух', points: 6, games: 5, color: '#FFC107', short: 'РХ' }
        ];

        let currentOpponentIndex = 1;

        // Перемикання вкладок нижнього меню
        function switchTab(tabId, element) {
            // Зняти active з усіх екранів і кнопок
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Встановити active на обраний
            document.getElementById(tabId + '-screen').classList.add('active');
            element.classList.add('active');

            // Якщо відкрили лігу - оновити таблицю
            if(tabId === 'league') renderTable();
            // Якщо відкрили матч - підготувати суперника
            if(tabId === 'match') prepareNextMatch();
        }

        // Відмальовка таблиці
        function renderTable() {
            // Сортування по очках
            teams.sort((a, b) => b.points - a.points);
            
            const tbody = document.getElementById('league-body');
            tbody.innerHTML = '';
            
            teams.forEach((team, index) => {
                const isMyTeam = team.id === 'shakhtar';
                const row = `
                    <tr class="team-row ${isMyTeam ? 'my-team' : ''}">
                        <td>${index + 1}</td>
                        <td>${team.name}</td>
                        <td class="text-center">${team.games}</td>
                        <td class="text-center"><b>${team.points}</b></td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // Підготовка екрану матчу
        function prepareNextMatch() {
            // Шукаємо наступного суперника (всі крім Шахтаря)
            const opponents = teams.filter(t => t.id !== 'shakhtar');
            const opponent = opponents[currentOpponentIndex % opponents.length];
            
            document.getElementById('opponent-name').innerText = `Шахтар vs ${opponent.name}`;
            document.getElementById('away-shield').innerText = opponent.short;
            document.getElementById('away-shield').style.backgroundColor = opponent.color;
            
            document.getElementById('home-score').innerText = '0';
            document.getElementById('away-score').innerText = '0';
            document.getElementById('match-logs').innerText = 'Матч готовий до початку...';
            document.getElementById('play-btn').disabled = false;
            document.getElementById('play-btn').innerText = 'СИМУЛЮВАТИ';
            document.getElementById('play-btn').style.opacity = '1';
        }

        // Симуляція матчу
        function playMatch() {
            const btn = document.getElementById('play-btn');
            btn.disabled = true;
            btn.innerText = 'ЙДЕ МАТЧ...';
            btn.style.opacity = '0.7';

            let homeGoals = 0;
            let awayGoals = 0;
            
            // Проста анімація зміни рахунку
            let time = 0;
            const interval = setInterval(() => {
                time += 15; // хвилини матчу
                
                // Рандомний шанс голу (у Шахтаря шансів більше)
                if (Math.random() > 0.75) homeGoals++;
                if (Math.random() > 0.85) awayGoals++;

                document.getElementById('home-score').innerText = homeGoals;
                document.getElementById('away-score').innerText = awayGoals;
                document.getElementById('match-logs').innerText = `Йде ${time}-а хвилина матчу...`;

                if (time >= 90) {
                    clearInterval(interval);
                    finishMatch(homeGoals, awayGoals);
                }
            }, 300);
        }

        // Завершення матчу та оновлення статистики
        function finishMatch(homeGoals, awayGoals) {
            const btn = document.getElementById('play-btn');
            document.getElementById('match-logs').innerText = `Матч завершено! Рахунок ${homeGoals}:${awayGoals}`;
            btn.innerText = 'НАСТУПНИЙ МАТЧ';
            btn.disabled = false;

            const opponents = teams.filter(t => t.id !== 'shakhtar');
            const currentOpponent = opponents[currentOpponentIndex % opponents.length];

            // Оновлюємо Шахтар
            let myTeam = teams.find(t => t.id === 'shakhtar');
            myTeam.games++;
            currentOpponent.games++;

            if (homeGoals > awayGoals) {
                myTeam.points += 3;
            } else if (homeGoals === awayGoals) {
                myTeam.points += 1;
                currentOpponent.points += 1;
            } else {
                currentOpponent.points += 3;
            }

            // Рандомні результати для інших команд, щоб таблиця жила
            teams.forEach(t => {
                if(t.id !== 'shakhtar' && t.id !== currentOpponent.id) {
                    t.games++;
                    t.points += Math.floor(Math.random() * 4); // 0, 1, 2 або 3 очки
                }
            });

            // Налаштовуємо кнопку на перехід до наступного туру
            btn.onclick = () => {
                currentOpponentIndex++;
                prepareNextMatch();
                btn.onclick = playMatch; // повертаємо функцію симуляції
            };
        }

        // Ініціалізація
        renderTable();
    </script>
</body>
</html>
