<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Superkickoff - ФК Епіцентр</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --bg-panel: #1a1a1a;
            --primary: #1B5E20; /* Колір Епіцентру */
            --primary-light: #4CAF50;
            --accent: #FFD600;
            --text-light: #ffffff;
            --text-muted: #999999;
            --nav-height: 65px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }

        /* Основний інтерфейс */
        #app-interface { display: flex; flex-direction: column; height: 100%; }
        header { background-color: var(--bg-panel); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); }
        .finances { font-weight: 800; color: var(--primary-light); background: rgba(76, 175, 80, 0.15); padding: 5px 12px; border-radius: 20px; font-size: 14px; }

        main { flex: 1; overflow-y: auto; padding-bottom: calc(var(--nav-height) + 10px); }
        .screen { display: none; padding: 15px; animation: slideUp 0.2s ease-out; }
        .screen.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Тактика та поле */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .controls-grid select { background: #222; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 13px; }

        .pitch {
            background: linear-gradient(180deg, #1b5e20 0%, #2e7d32 100%); border-radius: 15px; height: 360px;
            position: relative; border: 2px solid rgba(255, 255, 255, 0.2); display: flex; flex-direction: column; justify-content: space-around;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3); margin-bottom: 20px;
        }
        .pitch-line-center { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.2); }
        .pitch-circle { position: absolute; top: 50%; left: 50%; width: 70px; height: 70px; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; transform: translate(-50%, -50%); }

        .line { display: flex; justify-content: space-evenly; width: 100%; z-index: 5; }
        .player { display: flex; flex-direction: column; align-items: center; width: 60px; transition: transform 0.1s; }
        .player:active { transform: scale(0.9); }
        .player.selected .player-dot { border-color: var(--accent); box-shadow: 0 0 12px var(--accent); }
        .player.captain .player-dot::after { content: 'C'; position: absolute; top: -6px; right: -6px; background: var(--accent); color: #000; font-size: 9px; width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        .player-dot { width: 34px; height: 34px; background-color: #eee; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #000; font-weight: 800; font-size: 12px; border: 3px solid var(--primary-light); position: relative; }
        .player-name { margin-top: 5px; font-size: 10px; background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 4px; white-space: nowrap; font-weight: 600; }

        .bench-container { background: var(--bg-panel); border-radius: 12px; padding: 12px; }
        .bench-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 14px; align-items: center; }
        .bench-item:last-child { border-bottom: none; }
        .bench-item.selected { background: rgba(255, 214, 0, 0.15); border-radius: 8px; }
        .pos-badge { font-size: 10px; font-weight: 800; background: #444; padding: 2px 5px; border-radius: 4px; margin-right: 8px; }

        /* Ринок */
        .market-card { background: var(--bg-panel); padding: 15px; margin-bottom: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .btn-buy { background: var(--primary-light); color: #000; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 800; font-size: 12px; }

        /* Таблиця */
        .league-table { width: 100%; border-collapse: collapse; background: var(--bg-panel); border-radius: 12px; overflow: hidden; }
        .league-table th { background: #252525; padding: 12px; text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .league-table td { padding: 14px 12px; border-bottom: 1px solid #2a2a2a; font-size: 14px; }
        .row-my-team { background: rgba(76, 175, 80, 0.1); color: var(--primary-light); font-weight: 700; }

        /* Матч та Скаутинг */
        .match-view { background: var(--bg-panel); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .scouting-card { background: #222; border-radius: 10px; padding: 15px; margin-bottom: 20px; font-size: 13px; display: flex; justify-content: space-between; border-left: 4px solid #ff9800; }
        .scout-col { flex: 1; text-align: center; }
        .scout-val { font-size: 18px; font-weight: 900; margin-top: 5px; }

        .score-display { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 20px 0; }
        .score-box { font-size: 48px; font-weight: 900; }
        .team-logo-placeholder { width: 60px; height: 60px; background: #333; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; }
        
        .btn-action { background: var(--primary-light); color: #000; border: none; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: 800; width: 100%; margin-top: 15px; }
        .btn-action:disabled { background: #555; color: #888; }

        /* Навігація */
        nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--nav-height); background: var(--bg-panel); display: flex; border-top: 1px solid #333; padding-bottom: 5px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--text-muted); font-size: 10px; font-weight: 700; }
        .nav-item.active { color: var(--primary-light); }
        .nav-icon { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="app-interface">
        <header>
            <div id="team-meta">
                <h1 id="ui-team-name" style="font-size: 18px; font-weight: 900;">ФК Епіцентр</h1>
                <p id="ui-coach-name" style="font-size: 11px; color: var(--text-muted); font-weight: 600;">Тренер: Сергій Нагорняк</p>
            </div>
            <div class="finances" id="ui-budget">$2.0M</div>
        </header>

        <main>
            <div id="squad-tab" class="screen active">
                <div class="controls-grid">
                    <select id="formation-sel" onchange="updateTactics()">
                        <option value="4-4-2">Тактика: 4-4-2</option>
                        <option value="4-3-3">Тактика: 4-3-3</option>
                        <option value="3-5-2">Тактика: 3-5-2</option>
                        <option value="5-4-1">Тактика: 5-4-1 (Автобус)</option>
                    </select>
                    <select id="captain-sel" onchange="updateCaptain()"></select>
                </div>
                
                <div class="pitch" id="pitch-field"></div>

                <div class="bench-container">
                    <h4 style="font-size: 12px; margin-bottom: 10px; color: var(--text-muted);">ЗАПАСНІ (Клік на поле -> клік на лаву)</h4>
                    <div id="bench-list"></div>
                </div>
            </div>

            <div id="market-tab" class="screen">
                <h2 style="margin-bottom: 15px; font-size: 20px;">Трансферний ринок</h2>
                <div id="market-list"></div>
            </div>

            <div id="league-tab" class="screen">
                <h2 style="margin-bottom: 15px; font-size: 20px;">УПЛ</h2>
                <table class="league-table">
                    <thead><tr><th>#</th><th>Клуб</th><th>І</th><th>О</th></tr></thead>
                    <tbody id="league-body"></tbody>
                </table>
            </div>

            <div id="match-tab" class="screen">
                <div class="match-view">
                    
                    <h3 style="text-align: center; margin-bottom: 15px; font-size: 16px;">Наступний тур</h3>
                    
                    <div class="scouting-card">
                        <div class="scout-col">
                            <span style="color:var(--text-muted);">Наша сила</span>
                            <div class="scout-val" id="scout-my-power" style="color: var(--primary-light);">75</div>
                        </div>
                        <div class="scout-col" style="border-left: 1px solid #444; border-right: 1px solid #444;">
                            <span style="color:var(--text-muted);">Тактика гостя</span>
                            <div class="scout-val" id="scout-opp-form" style="font-size: 14px; margin-top:8px;">4-3-3</div>
                        </div>
                        <div class="scout-col">
                            <span style="color:var(--text-muted);">Сила гостя</span>
                            <div class="scout-val" id="scout-opp-power" style="color: #ff9800;">80</div>
                        </div>
                    </div>

                    <div class="score-display">
                        <div style="text-align:center;">
                            <div class="team-logo-placeholder" id="m-home-logo" style="background:#1B5E20;">ЕП</div>
                            <p style="font-size: 11px; margin-top: 5px; font-weight: 700;">Епіцентр</p>
                        </div>
                        <div class="score-box"><span id="s-home">0</span>:<span id="s-away">0</span></div>
                        <div style="text-align:center;">
                            <div class="team-logo-placeholder" id="m-away-logo">?</div>
                            <p style="font-size: 11px; margin-top: 5px; font-weight: 700;" id="m-away-name">Гість</p>
                        </div>
                    </div>
                    
                    <div id="m-log" style="text-align:center; font-size: 13px; color: var(--text-muted); min-height: 20px; margin-top:10px;">Матч не розпочато</div>
                    <button class="btn-action" id="btn-play-sim" onclick="startSim()">ГРАТИ МАТЧ</button>
                </div>
            </div>
        </main>

        <nav>
            <div class="nav-item active" onclick="navTo('squad', this)"><span class="nav-icon">👕</span><span>СКЛАД</span></div>
            <div class="nav-item" onclick="navTo('market', this)"><span class="nav-icon">💰</span><span>РИНОК</span></div>
            <div class="nav-item" onclick="navTo('league', this)"><span class="nav-icon">🏆</span><span>ЛІГА</span></div>
            <div class="nav-item" onclick="navTo('match', this)"><span class="nav-icon">⚽</span><span>МАТЧ</span></div>
        </nav>
    </div>

    <script>
        // База команд з коефіцієнтами сили (coef) та улюбленими тактиками (form)
        // Виключені команди, які не в цій лізі
        const UPL_TEAMS = [
            { id: 'epicentr', name: 'Епіцентр', color: '#1B5E20', pts: 0, g: 0, coef: 74, form: '4-4-2' }, // Команда гравця
            { id: 'shakhtar', name: 'Шахтар', color: '#f37021', pts: 0, g: 0, coef: 83, form: '4-3-3' },
            { id: 'dynamo', name: 'Динамо', color: '#005A9C', pts: 0, g: 0, coef: 82, form: '4-2-3-1' },
            { id: 'kryvbas', name: 'Кривбас', color: '#D32F2F', pts: 0, g: 0, coef: 78, form: '4-4-2' },
            { id: 'polissya', name: 'Полісся', color: '#FFD600', pts: 0, g: 0, coef: 77, form: '4-3-3' },
            { id: 'rukh', name: 'Рух', color: '#fdd835', pts: 0, g: 0, coef: 76, form: '4-1-4-1' },
            { id: 'oleksandriya', name: 'Олександрія', color: '#2e7d32', pts: 0, g: 0, coef: 76, form: '4-3-3' },
            { id: 'lnz', name: 'ЛНЗ', color: '#555', pts: 0, g: 0, coef: 75, form: '3-5-2' },
            { id: 'kolos', name: 'Колос', color: '#fff', pts: 0, g: 0, coef: 73, form: '5-3-2' }
        ];

        // Стартовий склад Епіцентру (базові рейтинги ~72-76)
        let squad = [
            { id: 1, name: 'Чорнобай', pos: 'GK', r: 73 }, { id: 2, name: 'Жмуйда', pos: 'DEF', r: 72 },
            { id: 3, name: 'Мороз', pos: 'DEF', r: 74 }, { id: 4, name: 'Григоращук', pos: 'DEF', r: 73 },
            { id: 5, name: 'Алібеков', pos: 'DEF', r: 75 }, { id: 6, name: 'Миронюк', pos: 'MID', r: 74 },
            { id: 7, name: 'Ліповуз', pos: 'MID', r: 73 }, { id: 8, name: 'Беженар', pos: 'MID', r: 75 },
            { id: 9, name: 'Ляшенко', pos: 'MID', r: 72 }, { id: 10, name: 'Кравчук', pos: 'FWD', r: 76 },
            { id: 11, name: 'Стень', pos: 'FWD', r: 74 },
            // Запасні
            { id: 12, name: 'Жмурко', pos: 'GK', r: 69 }, { id: 13, name: 'Глущук', pos: 'MID', r: 71 },
            { id: 14, name: 'Полюлях', pos: 'MID', r: 73 }, { id: 15, name: 'Коваленко', pos: 'FWD', r: 72 }
        ];

        // Ринок (кращі гравці УПЛ)
        let market = [
            { id: 101, name: 'Шапаренко', pos: 'MID', r: 84, price: 10000000 },
            { id: 102, name: 'Судаков', pos: 'MID', r: 85, price: 15000000 },
            { id: 103, name: 'Піхальонок', pos: 'MID', r: 81, price: 6000000 },
            { id: 104, name: 'Гуцуляк', pos: 'FWD', r: 79, price: 3500000 },
            { id: 105, name: 'Сваток', pos: 'DEF', r: 78, price: 2500000 },
            { id: 106, name: 'Квасниця', pos: 'FWD', r: 77, price: 2000000 }
        ];

        // Стан гри
        const GAME = {
            team: UPL_TEAMS[0], // Епіцентр
            budget: 2000000,
            starters: squad.slice(0, 11),
            bench: squad.slice(11),
            formation: [4, 4, 2],
            captainId: 1,
            selectedId: null,
            matchDay: 0
        };

        // Обчислення поточної сили складу (середній рейтинг основи)
        function getMyPower() {
            return Math.round(GAME.starters.reduce((sum, p) => sum + p.r, 0) / 11);
        }

        function initApp() {
            syncUI();
            renderMarket();
            renderLeague();
            prepMatch();
        }

        // --- КЕРУВАННЯ СКЛАДОМ ---
        function syncUI() {
            document.getElementById('ui-budget').innerText = `$ ${(GAME.budget / 1000000).toFixed(1)}M`;
            renderPitch();
            renderBench();
            updateCaptainSelect();
        }

        function renderPitch() {
            const pitch = document.getElementById('pitch-field');
            pitch.innerHTML = '<div class="pitch-line-center"></div><div class="pitch-circle"></div>';
            
            const lines = [
                { players: GAME.starters.slice(1 + GAME.formation[0] + GAME.formation[1]) }, // FWD
                { players: GAME.starters.slice(1 + GAME.formation[0], 1 + GAME.formation[0] + GAME.formation[1]) }, // MID
                { players: GAME.starters.slice(1, 1 + GAME.formation[0]) }, // DEF
                { players: [GAME.starters[0]] } // GK
            ];

            lines.forEach(l => {
                const div = document.createElement('div');
                div.className = 'line';
                l.players.forEach(p => {
                    const isSel = p.id === GAME.selectedId ? 'selected' : '';
                    const isCap = p.id === GAME.captainId ? 'captain' : '';
                    div.innerHTML += `
                        <div class="player ${isSel} ${isCap}" onclick="selectPlayer(${p.id})">
                            <div class="player-dot">${p.r}</div>
                            <div class="player-name">${p.name}</div>
                        </div>`;
                });
                pitch.appendChild(div);
            });
        }

        function renderBench() {
            const list = document.getElementById('bench-list');
            list.innerHTML = '';
            GAME.bench.forEach(p => {
                const isSel = p.id === GAME.selectedId ? 'selected' : '';
                list.innerHTML += `
                    <div class="bench-item ${isSel}" onclick="selectPlayer(${p.id})">
                        <div><span class="pos-badge">${p.pos}</span>${p.name}</div>
                        <strong>${p.r}</strong>
                    </div>`;
            });
        }

        function selectPlayer(id) {
            if (!GAME.selectedId) {
                GAME.selectedId = id;
            } else {
                if (GAME.selectedId !== id) swap(GAME.selectedId, id);
                GAME.selectedId = null;
            }
            syncUI();
            prepMatch(); // Оновлюємо силу в меню скаутингу, якщо змінили гравця
        }

        function swap(id1, id2) {
            const findAndRemove = (list, id) => {
                const idx = list.findIndex(p => p.id === id);
                return idx > -1 ? list.splice(idx, 1)[0] : null;
            };

            let p1 = findAndRemove(GAME.starters, id1) || findAndRemove(GAME.bench, id1);
            let p2 = findAndRemove(GAME.starters, id2) || findAndRemove(GAME.bench, id2);

            GAME.starters.push(p2);
            GAME.bench.push(p1);
            
            // Воротар завжди перший
            GAME.starters.sort((a,b) => (a.pos === 'GK' ? -1 : (b.pos === 'GK' ? 1 : 0)));
        }

        function updateTactics() {
            GAME.formation = document.getElementById('formation-sel').value.split('-').map(Number);
            renderPitch();
        }

        function updateCaptainSelect() {
            const s = document.getElementById('captain-sel');
            s.innerHTML = '';
            GAME.starters.forEach(p => {
                s.innerHTML += `<option value="${p.id}" ${p.id == GAME.captainId ? 'selected' : ''}>Капітан: ${p.name}</option>`;
            });
        }
        function updateCaptain() { GAME.captainId = parseInt(document.getElementById('captain-sel').value); syncUI(); }

        // --- РИНОК ---
        function renderMarket() {
            const list = document.getElementById('market-list');
            list.innerHTML = '';
            market.forEach(p => {
                list.innerHTML += `
                    <div class="market-card">
                        <div>
                            <strong>${p.name}</strong> (${p.pos})<br>
                            <span style="color:var(--primary-light); font-size:12px;">$ ${(p.price/1000000).toFixed(1)}M | Рейт: ${p.r}</span>
                        </div>
                        <button class="btn-buy" onclick="buy(${p.id})">Купити</button>
                    </div>`;
            });
        }

        function buy(id) {
            const idx = market.findIndex(p => p.id === id);
            const p = market[idx];
            if (GAME.budget >= p.price) {
                GAME.budget -= p.price;
                GAME.bench.push(p);
                market.splice(idx, 1);
                syncUI();
                renderMarket();
                alert(`Успішний трансфер: ${p.name}!`);
            } else { alert('Недостатньо грошей!'); }
        }

        // --- ЛІГА ТА МАТЧ ---
        function navTo(id, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAl
